name: Sync results from S3 to Git

on:
  workflow_call:
  workflow_dispatch:

env:
  S3_BUCKET: qstp-results
  GIT_PAT_1: ${{ secrets.GH_ACCESS_TOKEN }}
  OUTPUT_DIR: ./allure-report
  SINGLE_FILE_DIR: ./allure-single-file
  SOURCE_DIR: ./allure-results

jobs:
  sync-results-s3-git:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Prepare Result Files
        run: |
          cd /tmp
          git clone https://${GIT_PAT_1}@github.com/Netcracker/qubership-testing-results
          #echo "✅ Cleaning git files"
          #rm -rf /tmp/qubership-testing-results/Result/
          #echo "✅ Re-creating Result directory"
          #mkdir -p /tmp/qubership-testing-results/Result/
          echo "✅ Sync from S3 to temporary directory"
          aws s3 sync "s3://qstp-results/Result/" "/tmp/qubership-testing-results/Result/" --exclude "*" --include "*-result.json" --quiet
      
          echo "✅ Removing files that do not end with -result.json"
          cd /tmp/qubership-testing-results
          find Result/ -type f ! -name "*-result.json" -delete 1>/dev/null
      
      - name: Push to Git
        run: |
          cd /tmp/qubership-testing-results
          git config --global user.email "NetcrackerCLPLCI@gmail.com"
          git config --global user.name "NetcrackerCLPLCI"
          git remote set-url origin https://${GIT_PAT_1}@github.com/Netcracker/qubership-testing-results.git
      
          # Exit early if nothing changed
          if [ -z "$(git status --porcelain)" ]; then
            echo "✅ No changes to commit and push"
            exit 0
          fi
          
          echo "📦 Staging all changes..."
          git add -A > /dev/null
          
          # Get list of all staged files (null-delimited) and count them
          git diff --cached --name-only -z > /tmp/staged_files_null
          file_count=$(git diff --cached --name-only | wc -l)
          echo "ℹ️  Total changed files: $file_count"
          
          if [ "$file_count" -le 1000 ]; then
            echo "🚀 Committing all files in one batch..."
            git commit -q -m "Allure Results AutoSync $(date -Iseconds)"
            git push -q origin
            echo "✅ All files pushed successfully"
          else
            echo "📦 Splitting into chunks of 1000 files..."
            # Unstage everything (changes remain in working tree)
            git reset -q
          
            # Read file list from saved null-delimited file
            chunk=()
            count=0
            chunk_index=1
          
            # Helper to stage a chunk (handles deletions)
            stage_chunk() {
              local -n files=$1
              if [ ${#files[@]} -eq 0 ]; then return; fi
          
              # Split into existing and deleted files
              existing=()
              deleted=()
              for f in "${files[@]}"; do
                if [ -f "$f" ]; then
                  existing+=("$f")
                else
                  deleted+=("$f")
                fi
              done
          
              # Add existing files
              if [ ${#existing[@]} -gt 0 ]; then
                git add -- "${existing[@]}" > /dev/null
              fi
              # Remove deleted files from index
              if [ ${#deleted[@]} -gt 0 ]; then
                git rm --cached -- "${deleted[@]}" > /dev/null 2>&1
              fi
          
              # Commit the staged chunk
              git commit -q -m "Allure Results AutoSync $(date -Iseconds) - chunk $chunk_index"
            }
          
            while IFS= read -r -d '' file; do
              chunk+=("$file")
              ((count++))
              if [ "$count" -ge 1000 ]; then
                stage_chunk chunk
                chunk=()
                count=0
                ((chunk_index++))
              fi
            done < /tmp/staged_files_null
          
            # Commit any remaining files
            if [ "$count" -gt 0 ]; then
              stage_chunk chunk
            fi
          
            echo "🚀 Pushing all commits..."
            git push -q origin
            echo "✅ All $file_count files pushed successfully (in $((chunk_index - 1)) commits)"
          fi
