name: Scheduled Stop of EC2 Instances

on:
  schedule:
    - cron: '0 17 * * 1-5'

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (only show what would be stopped)"
        required: false
        default: false
        type: boolean

jobs:
  stop-instances:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check AWS CLI version
        run: aws --version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Debug Variables
        run: |
          echo "Pioneer ASG: ${{ vars.TF_VAR_Pioneer_ASG_NAME }}"
          echo "APIHub ASG ondemand: ${{ vars.TF_VAR_APIHUB_ONDEMAND_ASG_NAME }}"
          echo "APIHub ASG spot: ${{ vars.TF_VAR_APIHUB_SPOT_ASG_NAME }}"
          echo "Istio ASG: ${{ vars.TF_VAR_ISTIO_SVT_ASG_NAME }}"
          echo "Triggered by: ${{ github.event_name }}"
          echo "Dry run: ${{ github.event.inputs.dry_run }}"

      - name: Stop EC2 Instances with Tag Filtering
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || false }}
          IS_SCHEDULED: ${{ github.event_name == 'schedule' }}
        run: |
          cd ./ec2-scheduled/stop
          
          # Define all ASGs in an array
          ASG_NAMES=(
            "${{ vars.TF_VAR_Pioneer_ASG_NAME }}"
            "${{ vars.TF_VAR_APIHUB_ONDEMAND_ASG_NAME }}"
            "${{ vars.TF_VAR_APIHUB_SPOT_ASG_NAME }}"
            "${{ vars.TF_VAR_ISTIO_SVT_ASG_NAME }}"
          )
          
          # Set mode based on trigger
          if [[ "$IS_SCHEDULED" == "true" ]]; then
            echo "⏰ Scheduled run - stopping instances for real"
            CURRENT_MODE="real"
          elif [[ "$DRY_RUN" == "true" ]]; then
            echo "🧪 MANUAL DRY RUN - Only showing current state, no changes applied"
            CURRENT_MODE="dry"
          else
            echo "🚀 MANUAL REAL RUN - Stopping instances"
            CURRENT_MODE="real"
          fi
          
          # Function to check if ASG should be stopped
          should_stop_asg() {
            local asg_name=$1
          
            # Skip if ASG name is empty
            if [[ -z "$asg_name" ]]; then
              return 1
            fi
          
            # Get the autostop tag value
            TAG_VALUE=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "$asg_name" \
              --query "AutoScalingGroups[0].Tags[?Key=='autostop'].Value" \
              --output text 2>/dev/null)
          
            # Case 1: No tag → stop
            if [[ -z "$TAG_VALUE" ]]; then
              echo "ℹ️ No autostop tag found → will stop"
              return 0  # Stop
            fi
          
            # Case 2: Tag exists → stop only if value is 'true'
            if [[ "$TAG_VALUE" == "true" ]]; then
              echo "ℹ️ autostop=true found → will stop"
              return 0  # Stop
            else
              echo "⏸️ autostop=false found → will NOT stop"
              return 1  # Skip
            fi
          }
          
          # Function to show ASG state
          show_asg_state() {
            local asg_name=$1
            echo "----------------------------------------"
            echo "ASG: $asg_name"
            aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "$asg_name" \
              --query 'AutoScalingGroups[0].{CurrentMin:MinSize, CurrentMax:MaxSize, CurrentDesired:DesiredCapacity, Instances:length(Instances)}' \
              --output table 2>/dev/null || echo "⚠️ Failed to describe ASG"
          }
          
          # Process each ASG
          for ASG in "${ASG_NAMES[@]}"; do
            echo "----------------------------------------"
            echo "Checking ASG: $ASG"
          
            # Skip empty ASG names
            if [[ -z "$ASG" ]]; then
              echo "⚠️ Skipping empty ASG name"
              continue
            fi
          
            # Check if ASG exists
            if ! aws autoscaling describe-auto-scaling-groups --auto-scaling-group-names "$ASG" --query 'AutoScalingGroups[0]' --output text >/dev/null 2>&1; then
              echo "⚠️ ASG not found: $ASG"
              continue
            fi
          
            # Check if this ASG should be stopped
            if should_stop_asg "$ASG"; then
              # Show current state
              show_asg_state "$ASG"
          
              # Stop the ASG if in real mode
              if [[ "$CURRENT_MODE" == "real" ]]; then
                echo "🛑 Stopping ASG: $ASG"
                aws autoscaling update-auto-scaling-group \
                  --auto-scaling-group-name "$ASG" \
                  --min-size 0 --max-size 0 --desired-capacity 0
          
                if [ $? -eq 0 ]; then
                  echo "✅ Successfully stopped $ASG"
                else
                  echo "❌ Failed to stop $ASG"
                fi
              else
                echo "📋 Would stop: $ASG"
                echo "   aws autoscaling update-auto-scaling-group \\"
                echo "     --auto-scaling-group-name $ASG \\"
                echo "     --min-size 0 --max-size 0 --desired-capacity 0"
              fi
            else
              echo "⏭️ Skipping ASG: $ASG (autostop=false)"
            fi
          done
          
          echo "----------------------------------------"
          if [[ "$CURRENT_MODE" == "dry" ]]; then
            echo "🧪 Dry run completed. No changes made."
          elif [[ "$CURRENT_MODE" == "real" ]]; then
            echo "✅ All eligible ASGs processed."
          fi