name: Scheduled Stop of EC2 Instances

on:
  # Runs at 5 PM UTC on weekdays (real stop)
  schedule:
    - cron: '0 17 * * 1-5'

  # Manual trigger with dry run option
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (only show what would be stopped)"
        required: false
        default: false
        type: boolean

jobs:
  stop-instances:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Debug Variables
        run: |
          echo "Pioneer ASG: ${{ vars.TF_VAR_Pioneer_ASG_NAME }}"
          echo "APIHub ASG ondemand: ${{ vars.TF_VAR_APIHUB_ONDEMAND_ASG_NAME }}"
          echo "APIHub ASG spot: "${{vars.TF_VAR_APIHUB_SPOT_ASG_NAME}}"
          echo "Istio ASG: ${{ vars.TF_VAR_ISTIO_SVT_ASG_NAME }}"
          echo "Triggered by: ${{ github.event_name }}"
          echo "Dry run: ${{ github.event.inputs.dry_run }}"

      - name: Stop EC2 Instances (Scheduled - Real Execution)
        if: github.event_name == 'schedule'
        run: |
          cd ./ec2-scheduled/stop
          echo "⏰ Scheduled run - stopping instances for real"
          
          # Stop Auto Scaling Groups (set to 0)
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ vars.TF_VAR_Pioneer_ASG_NAME }}" \
            --min-size 0 --max-size 0 --desired-capacity 0
          
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ vars.TF_VAR_APIHUB_ONDEMAND_ASG_NAME }}" \
            --min-size 0 --max-size 0 --desired-capacity 0
          
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ vars.TF_VAR_APIHUB_SPOT_ASG_NAME }}" \
            --min-size 0 --max-size 0 --desired-capacity 0
          
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ vars.TF_VAR_ISTIO_SVT_ASG_NAME }}" \
            --min-size 0 --max-size 0 --desired-capacity 0

      - name: Manual Run - Dry Run (Show Only, No Changes)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: |
          cd ./ec2-scheduled/stop
          echo "🧪 MANUAL DRY RUN - Only showing current state, no changes applied"
          
          # Function to display ASG info
          show_asg_state() {
            local asg_name=$1
            echo "----------------------------------------"
            echo "ASG: $asg_name"
            aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "$asg_name" \
              --query 'AutoScalingGroups[0].{CurrentMin:MinSize, CurrentMax:MaxSize, CurrentDesired:DesiredCapacity, Instances:length(Instances)}' \
              --output table
          }
          
          # Show current state for all ASGs
          show_asg_state "${{ vars.TF_VAR_Pioneer_ASG_NAME }}"
          show_asg_state "${{ vars.TF_VAR_APIHUB_ONDEMAND_ASG_NAME }}"
          show_asg_state "${{vars.TF_VAR_APIHUB_SPOT_ASG_NAME}}"
          show_asg_state "${{ vars.TF_VAR_ISTIO_SVT_ASG_NAME }}"
          
          echo ""
          echo "📋 The following commands WOULD be executed in real mode:"
          echo "aws autoscaling update-auto-scaling-group --auto-scaling-group-name ${{ vars.TF_VAR_Pioneer_ASG_NAME }} --min-size 0 --max-size 0 --desired-capacity 0"
          echo "aws autoscaling update-auto-scaling-group --auto-scaling-group-name ${{ vars.TF_VAR_APIHUB_ONDEMAND_ASG_NAME }} --min-size 0 --max-size 0 --desired-capacity 0"
          echo "aws autoscaling update-auto-scaling-group --auto-scaling-group-name ${{ vars.TF_VAR_APIHUB_SPOT_ASG_NAME }} --min-size 0 --max-size 0 --desired-capacity 0"
          echo "aws autoscaling update-auto-scaling-group --auto-scaling-group-name ${{ vars.TF_VAR_ISTIO_SVT_ASG_NAME }} --min-size 0 --max-size 0 --desired-capacity 0"

      - name: Manual Run - Real Execution
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true'
        run: |
          cd ./ec2-scheduled/stop
          echo "🚀 MANUAL REAL RUN - Stopping instances"
          
          # Stop Auto Scaling Groups (set to 0)
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ vars.TF_VAR_Pioneer_ASG_NAME }}" \
            --min-size 0 --max-size 0 --desired-capacity 0
          
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ vars.TF_VAR_APIHUB_ONDEMAND_ASG_NAME }}" \
            --min-size 0 --max-size 0 --desired-capacity 0
          
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ vars.TF_VAR_APIHUB_SPOT_ASG_NAME }}" \
            --min-size 0 --max-size 0 --desired-capacity 0
          
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ vars.TF_VAR_ISTIO_SVT_ASG_NAME }}" \
            --min-size 0 --max-size 0 --desired-capacity 0
          
          echo "✅ All ASGs scaled down to 0"